name: Java CI with Maven

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Restore original wrapper properties
        run: |
          printf 'wrapperVersion=3.3.4\n' > .mvn/wrapper/maven-wrapper.properties
          printf 'distributionType=only-script\n' >> .mvn/wrapper/maven-wrapper.properties
          printf 'distributionUrl=https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/3.9.12/apache-maven-3.9.12-bin.zip\n' >> .mvn/wrapper/maven-wrapper.properties

      - name: Build with Maven
        run: ./mvnw test

      - name: Package JAR
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./mvnw package -DskipTests

      - name: Install Launch4j
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          wget -q https://sourceforge.net/projects/launch4j/files/launch4j-3/3.50/launch4j-3.50-linux-x64.tgz
          tar -xzf launch4j-3.50-linux-x64.tgz

      - name: Create Launch4j config
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          JAR_FILE=$(ls target/*.jar | grep -v original | head -1)
          cat > launch4j-config.xml << EOF
          <launch4jConfig>
            <dontWrapJar>false</dontWrapJar>
            <headerType>gui</headerType>
            <jar>$JAR_FILE</jar>
            <outfile>target/quizgame.exe</outfile>
            <errTitle>quizgame</errTitle>
            <cmdLine></cmdLine>
            <chdir>.</chdir>
            <priority>normal</priority>
            <downloadUrl>https://adoptium.net</downloadUrl>
            <supportUrl></supportUrl>
            <stayAlive>false</stayAlive>
            <restartOnCrash>false</restartOnCrash>
            <manifest></manifest>
            <jre>
              <path></path>
              <bundledJre64Bit>false</bundledJre64Bit>
              <bundledJreAsFallback>false</bundledJreAsFallback>
              <minVersion>17</minVersion>
              <jdkPreference>preferJre</jdkPreference>
              <initialHeapSize>256</initialHeapSize>
              <maxHeapSize>512</maxHeapSize>
            </jre>
          </launch4jConfig>
          EOF

      - name: Build EXE with Launch4j
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./launch4j/launch4j launch4j-config.xml

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/*.jar
            target/quizgame.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
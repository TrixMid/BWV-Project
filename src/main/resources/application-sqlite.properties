# SQLite Profile (Fallback)
spring.datasource.url=jdbc:sqlite:quizgame.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# Drop and recreate schema from entities on every start so data.sql seeds a clean DB
spring.jpa.hibernate.ddl-auto=create

# SQLite only supports one writer at a time
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.connection-timeout=30000

# Seeding – always run data.sql, but only AFTER Hibernate has created the schema
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
spring.sql.init.data-locations=classpath:data.sql
spring.jpa.defer-datasource-initialization=true

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wirtschaft und Sozialkunde - Klassenraum</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #dfe8f5;
            font-family: Arial, sans-serif;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>

<script>
    const ROOM_WIDTH = 1600;
    const ROOM_HEIGHT = 900;
    const PLAYER_SPEED = 240;

    const config = {
        type: Phaser.AUTO,
        width: window.innerWidth,
        height: window.innerHeight,
        backgroundColor: "#dfe8f5",
        physics: {
            default: "arcade",
            arcade: {
                gravity: { y: 0 },
                debug: false
            }
        },
        scale: {
            mode: Phaser.Scale.RESIZE,
            autoCenter: Phaser.Scale.CENTER_BOTH
        },
        scene: {
            preload,
            create,
            update
        }
    };

    new Phaser.Game(config);

    let player;
    let cursors;
    let keyA, keyD, keyW, keyS;
    let interactHint;
    let currentInteractable = null;

    let collisionObjects;
    let level1Book, level2Book, level3Book;
    let level1Zone, level2Zone, level3Zone;

    function preload() {}

    function create() {
        createTextures.call(this);

        this.physics.world.setBounds(0, 0, ROOM_WIDTH, ROOM_HEIGHT);
        this.cameras.main.setBounds(0, 0, ROOM_WIDTH, ROOM_HEIGHT);

        collisionObjects = this.physics.add.staticGroup();

        drawClassroom.call(this);
        createFurnitureCollisions.call(this);
        createLevelDesk.call(this);
        createPlayer.call(this);
        createUI.call(this);

        cursors = this.input.keyboard.createCursorKeys();
        keyA = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.A);
        keyD = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.D);
        keyW = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.W);
        keyS = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.S);

        this.physics.add.collider(player, collisionObjects);

        this.physics.add.overlap(player, level1Zone, () => {
            currentInteractable = { level: 1 };
        }, null, this);

        this.physics.add.overlap(player, level2Zone, () => {
            currentInteractable = { level: 2 };
        }, null, this);

        this.physics.add.overlap(player, level3Zone, () => {
            currentInteractable = { level: 3 };
        }, null, this);

        this.cameras.main.startFollow(player, true, 0.08, 0.08);
        this.cameras.main.setZoom(1);

        this.scale.on("resize", resizeGame, this);
    }

    function update() {
        handleMovement();
        updateInteractionState.call(this);
    }

    function createTextures() {
        const g = this.make.graphics({ x: 0, y: 0, add: false });

        // Wand
        g.fillStyle(0xf4efe6, 1);
        g.fillRect(0, 0, 64, 64);
        g.generateTexture("wall", 64, 64);
        g.clear();

        // Boden Holz
        g.fillStyle(0xc7925b, 1);
        g.fillRect(0, 0, 64, 64);
        g.lineStyle(2, 0xb17f4f, 1);
        g.lineBetween(0, 16, 64, 16);
        g.lineBetween(0, 32, 64, 32);
        g.lineBetween(0, 48, 64, 48);
        g.generateTexture("floor", 64, 64);
        g.clear();

        // Fenster
        g.fillStyle(0xffffff, 1);
        g.fillRoundedRect(0, 0, 120, 140, 8);
        g.fillStyle(0xa8d8ff, 1);
        g.fillRoundedRect(8, 8, 104, 124, 6);
        g.lineStyle(4, 0xffffff, 1);
        g.lineBetween(60, 8, 60, 132);
        g.lineBetween(8, 70, 112, 70);
        g.generateTexture("window", 120, 140);
        g.clear();

        // Tafel
        g.fillStyle(0x6b4423, 1);
        g.fillRoundedRect(0, 0, 280, 140, 8);
        g.fillStyle(0x2d5b37, 1);
        g.fillRoundedRect(10, 10, 260, 120, 4);
        g.generateTexture("board", 280, 140);
        g.clear();

        // Lehrertisch
        g.fillStyle(0x8b5a2b, 1);
        g.fillRoundedRect(0, 0, 280, 90, 8);
        g.fillStyle(0x6b3f1f, 1);
        g.fillRect(18, 70, 16, 40);
        g.fillRect(246, 70, 16, 40);
        g.generateTexture("teacherDesk", 280, 110);
        g.clear();

        // Schülertisch
        g.fillStyle(0x9a6232, 1);
        g.fillRoundedRect(0, 0, 120, 60, 6);
        g.fillStyle(0x73451f, 1);
        g.fillRect(12, 48, 10, 30);
        g.fillRect(98, 48, 10, 30);
        g.generateTexture("studentDesk", 120, 78);
        g.clear();

        // Stuhl
        g.fillStyle(0x4c6b8a, 1);
        g.fillRect(0, 16, 44, 10);
        g.fillRect(6, 0, 32, 20);
        g.fillRect(6, 26, 6, 22);
        g.fillRect(32, 26, 6, 22);
        g.generateTexture("chair", 44, 48);
        g.clear();

        // Bücher/Level
        g.fillStyle(0xd64545, 1);
        g.fillRoundedRect(0, 0, 48, 16, 3);
        g.generateTexture("bookRed", 48, 16);
        g.clear();

        g.fillStyle(0x3d73d6, 1);
        g.fillRoundedRect(0, 0, 48, 16, 3);
        g.generateTexture("bookBlue", 48, 16);
        g.clear();

        g.fillStyle(0x3aa65a, 1);
        g.fillRoundedRect(0, 0, 48, 16, 3);
        g.generateTexture("bookGreen", 48, 16);
        g.clear();

        // Nerd-Schüler
        g.fillStyle(0x1f1f1f, 1);
        g.fillEllipse(28, 14, 34, 20); // Haare
        g.fillStyle(0xf3c9a5, 1);
        g.fillCircle(28, 22, 16); // Kopf
        g.lineStyle(2, 0x111111, 1);
        g.strokeCircle(21, 22, 6); // Brille links
        g.strokeCircle(35, 22, 6); // Brille rechts
        g.lineBetween(27, 22, 29, 22); // Brillensteg
        g.fillStyle(0x4b6cb7, 1);
        g.fillRoundedRect(14, 38, 28, 26, 6); // Oberkörper
        g.fillStyle(0xe8e8e8, 1);
        g.fillRect(23, 38, 10, 10); // Hemd
        g.fillStyle(0x2f2f2f, 1);
        g.fillRect(17, 64, 8, 22); // Bein links
        g.fillRect(31, 64, 8, 22); // Bein rechts
        g.fillStyle(0xf3c9a5, 1);
        g.fillRect(8, 42, 8, 20); // Arm links
        g.fillRect(40, 42, 8, 20); // Arm rechts
        g.generateTexture("nerdPlayer", 56, 88);
        g.clear();
    }

    function drawClassroom() {
        // Wände
        this.add.rectangle(ROOM_WIDTH / 2, 160, ROOM_WIDTH, 320, 0xf4efe6).setDepth(-20);
        this.add.rectangle(ROOM_WIDTH / 2, ROOM_HEIGHT - 100, ROOM_WIDTH, 300, 0xc7925b).setDepth(-20);

        // Bodenmuster
        for (let y = 320; y < ROOM_HEIGHT; y += 64) {
            for (let x = 0; x < ROOM_WIDTH; x += 64) {
                this.add.image(x + 32, y + 32, "floor").setDepth(-19);
            }
        }

        // Deckenleiste
        this.add.rectangle(ROOM_WIDTH / 2, 24, ROOM_WIDTH, 48, 0xe7dfd1).setDepth(-18);

        // Fenster
        this.add.image(240, 150, "window").setDepth(-10);
        this.add.image(420, 150, "window").setDepth(-10);
        this.add.image(1180, 150, "window").setDepth(-10);
        this.add.image(1360, 150, "window").setDepth(-10);

        // Tafel
        this.add.image(800, 140, "board").setDepth(-9);
        this.add.text(800, 140, "Wirtschaft & Sozialkunde", {
            fontFamily: "Arial Black, Arial, sans-serif",
            fontSize: "26px",
            color: "#f5f5f5"
        }).setOrigin(0.5).setDepth(-8);

        // Uhr
        this.add.circle(1010, 90, 30, 0xffffff).setDepth(-8);
        this.add.circle(1010, 90, 30).setStrokeStyle(3, 0x444444).setDepth(-7);
        this.add.line(0, 0, 1010, 90, 1010, 72, 0x444444).setLineWidth(3).setDepth(-6);
        this.add.line(0, 0, 1010, 90, 1022, 90, 0x444444).setLineWidth(2).setDepth(-6);

        // Lehrertisch
        this.add.image(800, 300, "teacherDesk").setDepth(1);

        // Schüler-Tische
        const deskRows = [
            { y: 470, xs: [360, 620, 980, 1240] },
            { y: 620, xs: [360, 620, 980, 1240] }
        ];

        for (const row of deskRows) {
            for (const x of row.xs) {
                this.add.image(x, row.y, "studentDesk").setDepth(1);
                this.add.image(x, row.y + 56, "chair").setDepth(0);
            }
        }

        // Schrank
        this.add.rectangle(120, 250, 120, 220, 0x9a6232).setDepth(-5);
        this.add.rectangle(120, 250, 112, 212, 0x7b4d26).setDepth(-4);
        this.add.circle(94, 250, 4, 0xe1c16e).setDepth(-3);
        this.add.circle(146, 250, 4, 0xe1c16e).setDepth(-3);
    }

    function createFurnitureCollisions() {
        // Wände / Raumgrenzen innen
        createCollisionRect(800, 870, 1600, 40); // unten
        createCollisionRect(20, 450, 40, 900);   // links
        createCollisionRect(1580, 450, 40, 900); // rechts
        createCollisionRect(800, 20, 1600, 40);  // oben

        // Lehrertisch
        createCollisionRect(800, 320, 260, 70);

        // Schülertische
        const deskRows = [
            { y: 490, xs: [360, 620, 980, 1240] },
            { y: 640, xs: [360, 620, 980, 1240] }
        ];

        for (const row of deskRows) {
            for (const x of row.xs) {
                createCollisionRect(x, row.y, 110, 55);
            }
        }

        // Schrank
        createCollisionRect(120, 250, 110, 210);
    }

    function createLevelDesk() {
        level1Book = this.add.image(730, 270, "bookRed").setDepth(3);
        level2Book = this.add.image(800, 270, "bookBlue").setDepth(3);
        level3Book = this.add.image(870, 270, "bookGreen").setDepth(3);

        this.add.text(730, 245, "LEVEL 1", {
            fontFamily: "Arial Black, Arial, sans-serif",
            fontSize: "18px",
            color: "#ffffff",
            stroke: "#111111",
            strokeThickness: 4
        }).setOrigin(0.5).setDepth(4);

        this.add.text(800, 245, "LEVEL 2", {
            fontFamily: "Arial Black, Arial, sans-serif",
            fontSize: "18px",
            color: "#ffffff",
            stroke: "#111111",
            strokeThickness: 4
        }).setOrigin(0.5).setDepth(4);

        this.add.text(870, 245, "LEVEL 3", {
            fontFamily: "Arial Black, Arial, sans-serif",
            fontSize: "18px",
            color: "#ffffff",
            stroke: "#111111",
            strokeThickness: 4
        }).setOrigin(0.5).setDepth(4);

        level1Zone = this.add.zone(730, 300, 80, 80);
        level2Zone = this.add.zone(800, 300, 80, 80);
        level3Zone = this.add.zone(870, 300, 80, 80);

        this.physics.world.enable([level1Zone, level2Zone, level3Zone]);

        [level1Zone, level2Zone, level3Zone].forEach(zone => {
            zone.body.setAllowGravity(false);
            zone.body.moves = false;
        });
    }

    function createPlayer() {
        player = this.physics.add.sprite(800, 790, "nerdPlayer");
        player.setCollideWorldBounds(true);
        player.setDepth(5);
        player.body.setSize(34, 62, true);
        player.body.setOffset(11, 20);
    }

    function createUI() {
        this.add.text(28, 18, "WIRTSCHAFT & SOZIALKUNDE - KLASSENRAUM", {
            fontFamily: "Arial Black, Arial, sans-serif",
            fontSize: "24px",
            color: "#ffffff",
            stroke: "#16324f",
            strokeThickness: 6
        }).setScrollFactor(0).setDepth(100);

        this.add.text(28, 56, "Gehe zum Lehrertisch und wähle ein Level.", {
            fontFamily: "Arial, sans-serif",
            fontSize: "18px",
            color: "#ffffff",
            stroke: "#000000",
            strokeThickness: 4
        }).setScrollFactor(0).setDepth(100);

        interactHint = this.add.text(window.innerWidth / 2, window.innerHeight - 40, "", {
            fontFamily: "Arial Black, Arial, sans-serif",
            fontSize: "20px",
            color: "#ffffff",
            stroke: "#111111",
            strokeThickness: 5
        }).setOrigin(0.5).setScrollFactor(0).setDepth(100);
    }

    function createCollisionRect(x, y, w, h) {
        const rect = collisionObjects.create(x, y, null);
        rect.setSize(w, h);
        rect.refreshBody();
        rect.visible = false;
    }

    function handleMovement() {
        currentInteractable = null;

        const left = cursors.left.isDown || keyA.isDown;
        const right = cursors.right.isDown || keyD.isDown;
        const up = cursors.up.isDown || keyW.isDown;
        const down = cursors.down.isDown || keyS.isDown;

        let vx = 0;
        let vy = 0;

        if (left && !right) vx = -PLAYER_SPEED;
        else if (right && !left) vx = PLAYER_SPEED;

        if (up && !down) vy = -PLAYER_SPEED;
        else if (down && !up) vy = PLAYER_SPEED;

        player.setVelocity(vx, vy);

        if (vx < 0) {
            player.setFlipX(true);
        } else if (vx > 0) {
            player.setFlipX(false);
        }
    }

    function updateInteractionState() {
        const nearLevel1 = this.physics.overlap(player, level1Zone);
        const nearLevel2 = this.physics.overlap(player, level2Zone);
        const nearLevel3 = this.physics.overlap(player, level3Zone);

        if (nearLevel1) currentInteractable = { level: 1 };
        else if (nearLevel2) currentInteractable = { level: 2 };
        else if (nearLevel3) currentInteractable = { level: 3 };
        else currentInteractable = null;

        if (currentInteractable) {
            interactHint.setText("ENTER drücken für LEVEL " + currentInteractable.level);

            if (Phaser.Input.Keyboard.JustDown(cursors.space) || Phaser.Input.Keyboard.JustDown(cursors.shift)) {
                window.location.href = "/quiz?level=" + currentInteractable.level;
            }
        } else {
            interactHint.setText("");
        }

        // Extra Enter-Unterstützung
        const enterKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ENTER);
        if (currentInteractable && Phaser.Input.Keyboard.JustDown(enterKey)) {
            window.location.href = "/quiz?level=" + currentInteractable.level;
        }
    }

    function resizeGame(gameSize) {
        this.cameras.resize(gameSize.width, gameSize.height);
        if (interactHint) {
            interactHint.setPosition(gameSize.width / 2, gameSize.height - 40);
        }
    }
</script>

</body>
</html>
